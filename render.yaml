services:
  - type: web
    name: workout-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot:flask_app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_USER_ID
        sync: false
      - key: FLASK_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: workout-bot
          property: host

disks:
  - name: workout-data
    mountPath: /data
    sizeGB: 1
